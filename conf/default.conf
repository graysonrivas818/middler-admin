# Redirect all HTTP traffic to HTTPS at the Load Balancer level
server {
    listen 80;
    listen [::]:80;
    server_name www.admin.middler.com admin.middler.com;

    return 301 https://admin.middler.com$request_uri;
}

# Handle HTTP traffic inside the container (SSL is managed by AWS Load Balancer)
server {
    listen 80;
    listen [::]:80;
    server_name admin.middler.com;

    root /usr/share/nginx/html;
    index index.html;

    # Enable Gzip compression for performance
    gzip on;
    gzip_types text/plain application/javascript application/x-javascript text/javascript text/xml text/css image/svg+xml;
    gzip_vary on;

    # Serve Next.js static assets
    location /_next/ {
        root /usr/share/nginx/html;
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /public/ {
        root /usr/share/nginx/html;
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Next.js routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend (GraphQL, etc.)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        send_timeout 300;
    }

    # WebSockets (for socket.io)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # S3 Upload Proxy
    location /api/s3-upload {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
